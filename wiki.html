<!DOCTYPE html>
<meta charset="utf-8">
<title>Wiki 文档</title>
<meta name="description" content="Slimefun 教程、Wiki 文档、实用工具、计算器">
<link rel="icon" href="favicon.ico">
<link rel="stylesheet" href="shared.css">

<div class="top">
  <button class="back-home-btn" onclick="location.href='index.html'">🏠 返回主页</button>
  <div class="right-bar">
    <button class="mode-btn" id="modeToggle">切换亮色模式</button>
    <button class="donate-btn" onclick="confirm('确定前往爱发电支持作者吗？')&&window.open('https://ifdian.net/a/StarRingEngr','_blank')">捐赠</button>
  </div>
</div>

<div class="search-wrapper">
  <input type="text" class="search" id="searchInput" placeholder="搜索 Wiki 文档...">
  <div class="search-dropdown" id="searchDropdown"></div>
</div>

<div class="wiki-container">
  <div class="wiki-title" id="wikiTitle">Wiki 首页</div>
  <div class="wiki-content" id="wikiContent">加载中...</div>

  <div id="wikiNav" style="margin:30px 0; text-align:center; font-size:16px;"></div>

  <div style="text-align:center; margin:20px 0; font-size:14px;">
    💡 推荐使用高效实用的 Slimefun 在线计算器：
    <a href="https://starringengr.github.io/slimefunAsstOL/" target="_blank">点此使用</a>
  </div>
</div>

<div class="toast" id="toast"></div>

<script src="shared.js"></script>
<script>
// ===================== 你原版配置（完全不动） =====================
const CONFIG = {
  WIKI: "wiki",
  INDEX: "search-index.json",
  DEFAULT: "README",
  MAX_SUGGEST: 20
};

const el = {
  searchInput: document.getElementById("searchInput"),
  searchDropdown: document.getElementById("searchDropdown"),
  wikiTitle: document.getElementById("wikiTitle"),
  wikiContent: document.getElementById("wikiContent"),
  wikiNav: document.getElementById("wikiNav"),
};

let indexList = [];
let libLoaded = false;

// ===================== 加载 marked（不动） =====================
async function loadMarked() {
  if (libLoaded || window.marked) return true;
  return new Promise(res => {
    const s = document.createElement("script");
    s.src = "lib/marked.min.js";
    s.onload = () => { libLoaded = true; res(true); };
    document.head.appendChild(s);
  });
}

// ===================== 加载索引（不动） =====================
async function loadIndex() {
  if (indexList.length) return;
  try {
    const r = await fetch(CONFIG.INDEX);
    indexList = await r.json() || [];
  } catch {}
}

// ===================== 搜索逻辑（不动） =====================
function matchScore(name, q) {
  const lower = name.toLowerCase();
  const query = q.toLowerCase();
  if (lower === query) return 1000;
  if (lower.includes(query)) return 500;
  const chars = [...query];
  let hit = 0, lastPos = -1;
  for (const c of chars) {
    const p = lower.indexOf(c, lastPos + 1);
    if (p === -1) continue;
    hit++; lastPos = p;
  }
  return hit;
}

function doSearch(q) {
  if (!q || !indexList.length) return [];
  return indexList
    .map(n => ({ name: n, score: matchScore(n, q) }))
    .filter(i => i.score > 0)
    .sort((a, b) => b.score - a.score)
    .slice(0, CONFIG.MAX_SUGGEST)
    .map(i => i.name);
}

el.searchInput.addEventListener("focus", async () => {
  await loadIndex();
  if (el.searchInput.value.trim() !== '') return;
  el.searchDropdown.innerHTML = '';
  indexList.slice(0, CONFIG.MAX_SUGGEST).forEach(item => {
    const div = document.createElement("div");
    div.className = "search-item";
    div.textContent = item;
    div.onclick = () => { location.hash = item; el.searchInput.value = ''; el.searchDropdown.innerHTML = ''; };
    el.searchDropdown.appendChild(div);
  });
});

el.searchInput.addEventListener("input", async () => {
  await loadIndex();
  const q = el.searchInput.value.trim();
  const list = doSearch(q);
  el.searchDropdown.innerHTML = '';
  list.forEach(item => {
    const div = document.createElement("div");
    div.className = "search-item";
    div.textContent = item;
    div.onclick = () => { location.hash = item; el.searchInput.value = ''; el.searchDropdown.innerHTML = ''; };
    el.searchDropdown.appendChild(div);
  });
});

// ===================== 美化版·分页导航·左右对称·最终版 =====================
function renderNav() {
  el.wikiNav.style.display = "block";
  if (!indexList || indexList.length === 0) {
    el.wikiNav.innerHTML = "加载中...";
    return;
  }

  // 解码中文（核心修复）
  let currentFile = location.hash.slice(1) || CONFIG.DEFAULT;
  try { currentFile = decodeURIComponent(currentFile); } catch(e) {}

  // 匹配索引
  let idx = indexList.findIndex(item => item === currentFile);
  if (idx === -1) idx = 0;

  const total = indexList.length;
  const prevFile = indexList[(idx - 1 + total) % total];
  const nextFile = indexList[(idx + 1) % total];

  // 美化布局：左 - 中 - 右
  el.wikiNav.innerHTML = `
    <div class="wiki-pagination">
      <button onclick="location.hash='${prevFile}'">⬅️ 上一页：${prevFile}</button>
      <div class="page-info">📄 ${idx+1} / ${total}</div>
      <button onclick="location.hash='${nextFile}'">下一页：${nextFile} ➡️</button>
    </div>
  `;
}

async function render() {
  await loadMarked();
  await loadIndex();
  let path = location.hash.slice(1) || CONFIG.DEFAULT;
  
  // ✅✅✅ 你原来的正确逻辑！我彻底恢复！绝对不动！
  if (!path.endsWith(".md")) path += ".md";

  const url = `${CONFIG.WIKI}/${path}`;
  el.wikiTitle.textContent = "读取中...";
  el.searchDropdown.innerHTML = "";

  try {
    const res = await fetch(url);
    if (!res.ok) throw 404;
    const text = await res.text();
    el.wikiTitle.textContent = decodeURIComponent(path.replace(".md", ""));
    el.wikiContent.innerHTML = marked.parse(text);
    renderNav();
  } catch (e) {
    el.wikiTitle.textContent = "页面不存在";
    el.wikiContent.innerHTML = `<div class='not-found'>找不到文档</div>`;
  }
}

// ===================== 启动（不动） =====================
window.onload = async () => { await loadIndex(); render(); };
window.addEventListener("hashchange", render);
document.addEventListener("click", (e) => {
  if (!e.target.closest(".search-wrapper")) el.searchDropdown.innerHTML = "";
});
</script>
