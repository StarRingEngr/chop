<!DOCTYPE html>
<meta charset="utf-8">
<title>系统面板</title>
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{background:#121212;color:#e0e0e0;font-family:微软雅黑}
  .top{display:flex;justify-content:space-between;align-items:center;padding:12px 16px;background:#1a1a1a}
  .auth-btn{padding:9px 14px;background:#333;color:#fff;border:0;border-radius:6px;cursor:pointer}
  .auth-on{background:#00b866}
  .right-bar{display:flex;gap:10px;align-items:center}
  .donate-btn{padding:9px 14px;background:#b85a00;color:#fff;border:0;border-radius:6px;cursor:pointer}
  .ver{color:#888;font-size:12px}
  .search{width:100%;padding:12px 16px;background:#222;color:#fff;border:0;font-size:14px}
  .section{padding:10px 16px}
  .sec-head{display:flex;justify-content:space-between;align-items:center;padding:8px 0}
  .sec-head h3{font-size:14px;color:#ccc}
  .add-btn{width:34px;height:34px;border-radius:6px;background:#0088cc;color:#fff;border:0;font-size:18px;cursor:pointer}
  .item{background:#1c1c1c;padding:12px;border-radius:8px;margin-bottom:8px}
  .item .name{font-weight:bold}
  .item .tip{font-size:12px;color:#999;margin-top:4px}
  .mask{position:fixed;inset:0;background:#000000cc;display:none;align-items:center;justify-content:center}
  .pop{background:#222;width:92%;max-width:380px;padding:16px;border-radius:12px}
  .pop input{width:100%;padding:10px;margin:6px 0;background:#333;color:#fff;border:0;border-radius:6px}
  .pop button{margin-top:8px;padding:10px;width:100%;border:0;border-radius:6px}
  .btn-save{background:#0088cc;color:#fff}
  .btn-del{background:#cc3333;color:#fff;margin-top:6px}
  .toast{position:fixed;left:50%;bottom:24px;transform:translateX(-50%);background:#2a2a2a;color:#fff;padding:10px 16px;border-radius:8px;display:none}
</style>

<div class="top">
  <button class="auth-btn" id="authBtn">未认证</button>
  <div class="right-bar">
    <div class="ver">v1.1.10版</div>
    <button class="donate-btn" onclick="openDonate()">捐赠</button>
  </div>

<input class="search" id="searchInput" placeholder="搜索商品" oninput="doSearch()">

<div class="section">
  <div class="sec-head"><h3>商品列表</h3><button class="add-btn" onclick="openAddGood()">+</button></div>
  <div id="goodList"></div>
</div>
<div class="section">
  <div class="sec-head"><h3>封禁名单</h3><button class="add-btn" onclick="openAddBad()">+</button></div>
  <div id="badList"></div>
</div>

<div class="mask" id="mask"><div class="pop" id="pop"></div></div>
<div class="toast" id="toast"></div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
const SUPABASE_URL = "https://gxcfblgizxooslbgvmoj.supabase.co";
const ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imd4Y2ZibGdpenhvb3NsYmd2bW9qIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI3MTU4OTAsImV4cCI6MjA4ODI5MTg5MH0.BaTek6i25igE9C0xwgC9KI1Cgc2GUFlMOzSZ1tFHOZQ";

let auth = false;
let client = supabase.createClient(SUPABASE_URL, ANON_KEY);
let goods = [], bans = [];

function showToast(m){let t=document.getElementById("toast");t.textContent=m,t.style.display="block",setTimeout(()=>t.style.display="none",1600)}
function showPop(h){document.getElementById("pop").innerHTML=h,document.getElementById("mask").style.display="flex"}
function hidePop(){document.getElementById("mask").style.display="none"}

// 纯前端仅记录状态，不校验密码
async function doAuth(){
  if(auth){client=supabase.createClient(SUPABASE_URL,ANON_KEY),auth=false,document.getElementById("authBtn").textContent="未认证",document.getElementById("authBtn").classList.remove("auth-on"),showToast("已退出"),await refresh();return}
  let i=prompt("请输入管理密码：");if(!i)return
  // 只携带头，不做本地判断，权限全由RLS控制
  client=supabase.createClient(SUPABASE_URL,ANON_KEY,{global:{headers:{"app.pass":i}}})
  auth=true,document.getElementById("authBtn").textContent="已认证",document.getElementById("authBtn").classList.add("auth-on"),showToast("已提交认证"),await refresh()
}

document.getElementById("authBtn").onclick=doAuth

async function refresh(){
  let {data:iv}=await client.from("iv").select("*")
  let {data:bad}=await client.from("badlist").select("*")
  goods=iv||[],bans=bad||[],renderGood(),renderBad()
}

function renderGood(){goodList.innerHTML=goods.map(i=>`<div class="item" onclick="openEditGood(${i.id})"><div class="name">${i.name}</div><div class="tip">价格：${i.price}</div></div>`).join("")}
function renderBad(){badList.innerHTML=bans.map(i=>`<div class="item" onclick="openEditBad(${i.id})"><div class="name">${i.username}</div><div class="tip">${i.reason}</div></div>`).join("")}
function doSearch(){let k=searchInput.value.toLowerCase(),l=goods.filter(x=>x.name.includes(k));goodList.innerHTML=l.map(i=>`<div class="item"><div class="name">${i.name}</div><div class="tip">价格：${i.price}</div></div>`).join("")}

function openEditGood(id){!auth?showToast("未认证"):showPop(`<h3>编辑</h3><input id="gn" value="${goods.find(x=>x.id==id).name}"><input id="gp" value="${goods.find(x=>x.id==id).price}"><button class="btn-save" onclick="saveGood(${id})">保存</button><button class="btn-del" onclick="delGood(${id})">删除</button>`)}
function openEditBad(id){!auth?showToast("未认证"):showPop(`<h3>编辑</h3><input id="bu" value="${bans.find(x=>x.id==id).username}"><input id="br" value="${bans.find(x=>x.id==id).reason}"><button class="btn-save" onclick="saveBad(${id})">保存</button><button class="btn-del" onclick="delBad(${id})">删除</button>`)}
function openAddGood(){!auth?showToast("未认证"):showPop(`<h3>新增</h3><input id="gn" placeholder="名称"><input id="gp" placeholder="价格"><button class="btn-save" onclick="addGood()">添加</button>`)}
function openAddBad(){!auth?showToast("未认证"):showPop(`<h3>新增</h3><input id="bu" placeholder="玩家名"><input id="br" placeholder="原因"><button class="btn-save" onclick="addBad()">添加</button>`)}

async function addGood(){await client.from("iv").insert([{name:document.getElementById("gn").value,price:document.getElementById("gp").value}]),hidePop(),await refresh(),showToast("完成")}
async function saveGood(id){await client.from("iv").update({name:document.getElementById("gn").value,price:document.getElementById("gp").value}).eq("id",id),hidePop(),await refresh(),showToast("完成")}
async function delGood(id){confirm("?")&&(await client.from("iv").delete().eq("id",id),hidePop(),await refresh(),showToast("完成"))}
async function addBad(){await client.from("badlist").insert([{username:document.getElementById("bu").value,reason:document.getElementById("br").value}]),hidePop(),await refresh(),showToast("完成")}
async function saveBad(id){await client.from("badlist").update({username:document.getElementById("bu").value,reason:document.getElementById("br").value}).eq("id",id),hidePop(),await refresh(),showToast("完成")}
async function delBad(id){confirm("?")&&(await client.from("badlist").delete().eq("id",id),hidePop(),await refresh(),showToast("完成"))}
function openDonate(){confirm("?")&&window.open("https://afdian.com/a/StarRingEngr","_blank")}

refresh()
</script>
