<!DOCTYPE html>
<meta charset="utf-8">
<title>系统面板</title>
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{background:#121212;color:#e0e0e0;font-family:微软雅黑}
  .top{display:flex;justify-content:space-between;align-items:center;padding:12px 16px;background:#1a1a1a}
  .auth-btn{padding:9px 14px;background:#333;color:#fff;border:0;border-radius:6px;cursor:pointer}
  .auth-on{background:#00b866}
  .right-bar{display:flex;gap:10px}
  .donate-btn{padding:9px 14px;background:#b85a00;color:#fff;border:0;border-radius:6px;cursor:pointer}
  .ver{color:#888;font-size:12px}
  .search{width:100%;padding:12px 16px;background:#222;color:#fff;border:0;font-size:14px}
  .section{padding:10px 16px}
  .sec-head{display:flex;justify-content:space-between;align-items:center;padding:8px 0}
  .add-btn{width:34px;height:34px;border-radius:6px;background:#0088cc;color:#fff;border:0;cursor:pointer}
  .item{background:#1c1c1c;padding:12px;border-radius:8px;margin-bottom:8px}
  .item .name{font-weight:bold}
  .item .tip{font-size:12px;color:#999;margin-top:4px}
  .mask{position:fixed;inset:0;background:#000000cc;display:none;align-items:center;justify-content:center}
  .pop{background:#222;width:92%;max-width:380px;padding:16px;border-radius:12px}
  .pop input{width:100%;padding:10px;margin:6px 0;background:#333;color:#fff;border:0}
  .pop button{margin-top:8px;padding:10px;width:100%;border:0;border-radius:6px}
  .btn-save{background:#0088cc;color:#fff}
  .btn-del{background:#cc3333;color:#fff}
  .toast{position:fixed;left:50%;bottom:24px;transform:translateX(-50%);background:#2a2a2a;color:#fff;padding:10px 16px;border-radius:8px;display:none}
</style>

<div class="top">
  <button class="auth-btn" id="authBtn">游客模式</button>
  <div class="right-bar">
    <div class="ver">v1.2.2安全版</div>
    <button class="donate-btn" onclick="openDonate()">捐赠</button>
  </div>
</div>

<input class="search" id="searchInput" placeholder="搜索商品">

<div class="section">
  <div class="sec-head">
    <h3>商品列表</h3>
    <button class="add-btn" onclick="openAddGood()">+</button>
  </div>
  <div id="goodList"></div>
</div>

<div class="section">
  <div class="sec-head">
    <h3>封禁名单</h3>
    <button class="add-btn" onclick="openAddBad()">+</button>
  </div>
  <div id="badList"></div>
</div>

<div class="mask" id="mask"><div class="pop" id="pop"></div></div>
<div class="toast" id="toast"></div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script>

const SUPABASE_URL = "https://gxcfblgizxooslbgvmoj.supabase.co";
const READ_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imd4Y2ZibGdpenhvb3NsYmd2bW9qIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI3MTU4OTAsImV4cCI6MjA4ODI5MTg5MH0.BaTek6i25igE9C0xwgC9KI1Cgc2GUFlMOzSZ1tFHOZQ";
const CIPHER = "2cab452a86cc1a46ee9300dc33401135ca30e5749cef346a36b26cac0d96b4bd1f91457bcaee0065d19979d80f75314efe3df445bdd80b192fab76d337b4aaaf2588660bd2c2144b95a378cf0f581f60f43cc26fa3e3551126a848fe769f93dc389b66358de81416d2a019dc50733542f13b9e33bccd251525a87dcb2db2aea07a9c750bd7c62d7a95b51ed415733552b03aef4ee3cc0c1e61be61d371b090827c9f4772cac9187bc4917cfc540f3163c160ef37adf6011c6cba6cab079aa7d70e87492ea9c4037cfbcb3ed32e750255";

let isAdmin = false;
let goods = [], bans = [];
let client = supabase.createClient(SUPABASE_URL, READ_KEY);

function showToast(msg) {
  const t = document.getElementById("toast");
  t.textContent = msg;
  t.style.display = "block";
  setTimeout(()=>t.style.display="none", 1500);
}

function showPop(html) {
  document.getElementById("pop").innerHTML = html;
  document.getElementById("mask").style.display = "flex";
}

function hidePop() {
  document.getElementById("mask").style.display = "none";
}

// 完全和你 Python 逻辑一致
async function xorDecrypt(hexStr, key) {
  const enc = new TextEncoder();
  const keyData = enc.encode(key);
  const hashBuffer = await crypto.subtle.digest("SHA-256", keyData);
  const hashBytes = new Uint8Array(hashBuffer);
  const dataBytes = new Uint8Array(hexStr.match(/.{1,2}/g).map(b => parseInt(b,16)));
  const res = new Uint8Array(dataBytes.length);
  for(let i=0;i<dataBytes.length;i++) res[i] = dataBytes[i] ^ hashBytes[i % hashBytes.length];
  return new TextDecoder().decode(res);
}

async function doAuth() {
  if(isAdmin) { showToast("已登录，错误需刷新"); return; }
  const input = prompt("输入管理员密码\n错误请刷新页面！");
  if(!input) return;
  showToast("验证中...");
  try {
    const adminKey = await xorDecrypt(CIPHER, input);
    client = supabase.createClient(SUPABASE_URL, adminKey);
    isAdmin = true;
    document.getElementById("authBtn").textContent = "管理员模式";
    document.getElementById("authBtn").classList.add("auth-on");
    showToast("密码正确");
    refresh();
  } catch(e) {
    showToast("密码错误，请刷新！");
  }
}

document.getElementById("authBtn").onclick = doAuth;

async function refresh() {
  const { data: iv } = await client.from("iv").select("*");
  const { data: bad } = await client.from("badlist").select("*");
  goods = iv || []; bans = bad || [];
  renderGood(); renderBad();
}

function renderGood() {
  goodList.innerHTML = goods.map(i=>`<div class="item" onclick="openEditGood(${i.id})"><div class="name">${i.name}</div><div class="tip">${i.price}</div></div>`).join("");
}
function renderBad() {
  badList.innerHTML = bans.map(i=>`<div class="item" onclick="openEditBad(${i.id})"><div class="name">${i.username}</div><div class="tip">${i.reason}</div></div>`).join("");
}

document.getElementById("searchInput").addEventListener("input", ()=>{
  const kw = document.getElementById("searchInput").value.toLowerCase();
  const list = goods.filter(x=>x.name.toLowerCase().includes(kw));
  goodList.innerHTML = list.map(i=>`<div class="item"><div class="name">${i.name}</div><div class="tip">${i.price}</div></div>`).join("");
});

function openEditGood(id){ if(!isAdmin) return showToast("无权限"); const it=goods.find(x=>x.id==id); showPop(`<h3>编辑</h3><input id="gn" value="${it.name}"><input id="gp" value="${it.price}"><button onclick="saveGood(${id})">保存</button><button onclick="delGood(${id})">删除</button>`); }
function openEditBad(id){ if(!isAdmin) return showToast("无权限"); const it=bans.find(x=>x.id==id); showPop(`<h3>编辑</h3><input id="bu" value="${it.username}"><input id="br" value="${it.reason}"><button onclick="saveBad(${id})">保存</button><button onclick="delBad(${id})">删除</button>`); }
function openAddGood(){ if(!isAdmin) return showToast("无权限"); showPop(`<h3>新增</h3><input id="gn" placeholder="名称"><input id="gp" placeholder="价格"><button onclick="addGood()">添加</button>`); }
function openAddBad(){ if(!isAdmin) return showToast("无权限"); showPop(`<h3>新增</h3><input id="bu" placeholder="玩家名"><input id="br" placeholder="原因"><button onclick="addBad()">添加</button>`); }

async function addGood(){ await client.from("iv").insert([{name:document.getElementById("gn").value,price:document.getElementById("gp").value}]); hidePop(); refresh(); showToast("成功"); }
async function saveGood(id){ await client.from("iv").update({name:document.getElementById("gn").value,price:document.getElementById("gp").value}).eq("id",id); hidePop(); refresh(); showToast("成功"); }
async function delGood(id){ if(confirm("?")){ await client.from("iv").delete().eq("id",id); hidePop(); refresh(); showToast("成功"); } }
async function addBad(){ await client.from("badlist").insert([{username:document.getElementById("bu").value,reason:document.getElementById("br").value}]); hidePop(); refresh(); showToast("成功"); }
async function saveBad(id){ await client.from("badlist").update({username:document.getElementById("bu").value,reason:document.getElementById("br").value}).eq("id",id); hidePop(); refresh(); showToast("成功"); }
async function delBad(id){ if(confirm("?")){ await client.from("badlist").delete().eq("id",id); hidePop(); refresh(); showToast("成功"); } }

function openDonate(){ if(confirm("?")) window.open("https://afdian.com/a/StarRingEngr","_blank"); }

refresh();
</script>
