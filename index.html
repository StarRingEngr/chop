<!DOCTYPE html>
<meta charset="utf-8">
<title>导航主页</title>
<link rel="stylesheet" href="shared.css">
<link rel="icon" href="favicon.ico">

<div class="top">
  <div class="visitor">chop导航主页</div>
  <div class="right-bar">
    <button class="mode-btn" id="modeToggle">切换亮色模式</button>
    <div class="ver">门户 v1.0</div>
    <button class="donate-btn" onclick="openDonate()">捐赠</button>
  </div>
</div>

<div class="custom-welcome">
  欢迎访问chop工具站(此非巧克力官方网站)！请选择你要进入的页面：
</div>

<!-- 工具区域（动态渲染） -->
<div class="category-section">
  <div class="category-title">⚙️ 工具</div>
  <div class="link-grid" id="internalToolsGrid"></div>
</div>

<!-- 代理价目表区域（动态加载） -->
<div class="category-section">
  <div class="category-title">📦 代理价目表</div>
  <div id="proxyList" class="link-grid">
    <div class="loading">加载中...</div>
  </div>
</div>

<!-- 外部链接区域（动态渲染） -->
<div class="category-section">
  <div class="category-title">🔗 常用链接</div>
  <div class="link-grid" id="externalLinks"></div>
</div>

<script src="shared.js"></script>
<script>
  // 以下为原有函数，保持不变
  function renderLinkGrid(containerId, links) {
    const container = document.getElementById(containerId);
    if (!container) return;
    container.innerHTML = links.map(link => `
      <a href="${link.url}" class="nav-card" target="${link.target || '_blank'}">
        <h3>${link.icon || '🔗'} ${escapeHtml(link.name)}</h3>
        <p>${escapeHtml(link.desc)}</p>
      </a>
    `).join('');
  }

  function openDonate() {
    if (confirm("确定前往爱发电支持作者吗？")) window.open("https://ifdian.net/a/StarRingEngr","_blank");
  }

  // 加载 JSONL 代理列表（原样保留）
  async function loadProxyList() {
    const container = document.getElementById('proxyList');
    try {
      const response = await fetch('json/proxy-list.jsonl');
      if (!response.ok) throw new Error('代理列表加载失败');
      const text = await response.text();
      const lines = text.split('\n').filter(line => line.trim() !== '');
      if (lines.length === 0) {
        container.innerHTML = '<div class="loading">暂无代理价目表</div>';
        return;
      }
      const proxies = lines.map(line => JSON.parse(line));
      container.innerHTML = proxies.map(proxy => `
        <a href="proxies/${encodeURIComponent(proxy.file)}" class="nav-card">
          <h3>📄 ${escapeHtml(proxy.name)}</h3>
          <p>${escapeHtml(proxy.description || '')}</p>
          <p style="font-size: 12px; margin-top: 8px;">版本：${escapeHtml(proxy.version || '')}</p>
        </a>
      `).join('');
    } catch (error) {
      console.error(error);
      container.innerHTML = '<div class="loading">代理列表加载失败，请检查 proxy-list.jsonl 文件是否存在。</div>';
    }
  }

  // 新增：加载工具列表
  async function loadInternalTools() {
    try {
      const res = await fetch('json/internal-tools.jsonl');
      const text = await res.text();
      const lines = text.split('\n').filter(l => l.trim());
      const tools = lines.map(l => JSON.parse(l));
      renderLinkGrid('internalToolsGrid', tools);
    } catch (e) {
      document.getElementById('internalToolsGrid').innerHTML = '<div class="loading">工具列表加载失败</div>';
    }
  }

  // 新增：加载外部链接
  async function loadExternalLinks() {
    try {
      const res = await fetch('json/external-links.jsonl');
      const text = await res.text();
      const lines = text.split('\n').filter(l => l.trim());
      const links = lines.map(l => JSON.parse(l));
      renderLinkGrid('externalLinks', links);
    } catch (e) {
      document.getElementById('externalLinks').innerHTML = '<div class="loading">外部链接加载失败</div>';
    }
  }

  // 初始化（调用顺序不变，代理列表保持原样）
  function init() {
    loadInternalTools();
    loadExternalLinks();
    loadProxyList();
  }

  init();
</script>
