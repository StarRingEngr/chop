<!DOCTYPE html>
<meta charset="utf-8">
<title>系统面板</title>
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{background:#111;color:#fff;font-family:微软雅黑;padding:20px}
  .search{width:100%;padding:12px;background:#222;color:#fff;border:1px solid #444;border-radius:6px;font-size:16px;margin-bottom:10px}
  .card{background:#222;padding:12px;margin:10px 0;border-radius:8px;display:flex;gap:12px;align-items:center}
  .card img{width:60px;height:60px;background:#333;border-radius:6px}
  .bad{background:#311;padding:12px;border-radius:8px;margin:8px 0}
  button{padding:10px 14px;background:#08c;color:#fff;border:0;border-radius:6px;cursor:pointer;margin:4px}
  .admin{background:#222;padding:16px;border-radius:10px;margin:20px 0;display:none}
  input{width:240px;padding:10px;margin:6px;background:#333;color:#fff;border:1px solid #666;border-radius:6px}
  .status{color:#0f8;margin-bottom:10px}
  .hidden{display:none}
</style>

<div class="status" id="loginStatus">未登录</div>

<input class="search" id="kw" placeholder="搜索物品" oninput="s()">
<button onclick="toggleAdmin()">管理员面板（显示/隐藏）</button>

<h2>商品列表</h2>
<div id="goodList"></div>

<h2>封禁名单</h2>
<div id="badList"></div>

<div class="admin" id="adminPanel">
  <h3>管理员登录</h3>
  <input id="e" placeholder="邮箱"><br>
  <input id="p" type="password" placeholder="密码"><br>
  <button onclick="login()">登录</button>
  <button onclick="logout()">退出登录</button>

  <h3>添加商品</h3>
  <input id="n" placeholder="物品名">
  <input id="pr" placeholder="价格">
  <input id="inf" placeholder="备注"><br>
  <button onclick="addg()">添加商品</button>

  <h3>添加封禁</h3>
  <input id="u" placeholder="玩家名">
  <input id="r" placeholder="原因">
  <input id="t" placeholder="时间">
  <input id="op" placeholder="操作人"><br>
  <button onclick="addb()">添加封禁</button>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
const sb = supabase.createClient(
"https://gxcfblgizxooslbgvmoj.supabase.co",
"eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imd4Y2ZibGdpenhvb3NsYmd2bW9qIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI3MTU4OTAsImV4cCI6MjA4ODI5MTg5MH0.BaTek6i25igE9C0xwgC9KI1Cgc2GUFlMOzSZ1tFHOZQ"
)

let goods = []
let isAdmin = false

checkAuth()
load()

function toggleAdmin(){
  let a = document.getElementById("adminPanel")
  a.style.display = a.style.display=="block" ? "none" : "block"
}

async function checkAuth() {
  const { data } = await sb.auth.getUser()
  if (data.user) {
    isAdmin = true
    document.getElementById("loginStatus").innerText = "已登录（管理员）"
  } else {
    isAdmin = false
    document.getElementById("loginStatus").innerText = "未登录"
  }
}

async function login(){
  await sb.auth.signInWithPassword({email:e.value,password:p.value})
  alert("登录成功")
  checkAuth()
  load()
}

async function logout(){
  await sb.auth.signOut()
  alert("已退出")
  checkAuth()
  load()
}

async function load(){
  let {data:iv} = await sb.from("iv").select("*")
  let {data:bad} = await sb.from("badlist").select("*")
  goods = iv||[]

  goodList.innerHTML = goods.map(i=>`
    <div class="card">
      <img src="images/${i.name}.png" onerror="this.remove()">
      <div><b>${i.name}</b><br>价格：${i.price}<br>${i.info||""}
      ${isAdmin ? `<br><button onclick=confirmDelg(${i.id})>删除</button>` : ""}
      </div>
    </div>`).join("")

  badList.innerHTML = (bad||[]).map(i=>`
    <div class="bad">${i.username}｜${i.reason}｜${i.time||""}｜${i.operator||""}
    ${isAdmin ? `<button onclick=confirmDelb(${i.id})>删除</button>` : ""}
    </div>`).join("")
}

function confirmDelg(id){
  if(!isAdmin)return
  if(confirm("确定删除？")) rg(id)
}
function confirmDelb(id){
  if(!isAdmin)return
  if(confirm("确定删除？")) rb(id)
}

function s(){
  let k = kw.value.toLowerCase()
  let f = goods.filter(i=>i.name.toLowerCase().includes(k))
  goodList.innerHTML = f.map(i=>`
    <div class="card">
      <img src="images/${i.name}.png" onerror="this.remove()">
      <div><b>${i.name}</b><br>价格：${i.price}<br>${i.info||""}</div>
    </div>`).join("")
}

async function addg(){
  if(!isAdmin){alert("请先登录");return}
  await sb.from("iv").insert([{name:n.value,price:pr.value,info:inf.value}])
  load()
}
async function rg(id){await sb.from("iv").delete().eq("id",id);load()}
async function addb(){
  if(!isAdmin){alert("请先登录");return}
  await sb.from("badlist").insert([{username:u.value,reason:r.value,time:t.value,operator:op.value}])
  load()
}
async function rb(id){await sb.from("badlist").delete().eq("id",id);load()}
</script>
