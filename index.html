<!DOCTYPE html>
<meta charset="utf-8">
<title>导航主页</title>
<link rel="stylesheet" href="shared.css">
<style>
  .nav-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
    gap: 20px;
    padding: 20px 16px;
  }
  .nav-card {
    background: var(--bg-item);
    border-radius: 12px;
    padding: 20px;
    text-align: center;
    transition: transform 0.2s;
    text-decoration: none;
    color: var(--color-text);
    display: block;
  }
  .nav-card:hover {
    transform: translateY(-5px);
    background: var(--bg-collapse-header);
  }
  .nav-card h3 {
    margin-bottom: 10px;
  }
  .nav-card p {
    font-size: 14px;
    color: var(--color-tip);
  }
  .external-links {
    margin: 20px 16px;
    padding: 15px;
    background: var(--bg-custom-text);
    border-radius: 12px;
    text-align: center;
    display: flex;
    flex-wrap: wrap;
    justify-content: center;
    gap: 12px;
  }
  .external-links a {
    display: inline-block;
    padding: 8px 16px;
    background: var(--btn-add);
    color: white;
    text-decoration: none;
    border-radius: 8px;
  }
  .section-title {
    margin: 20px 16px 0;
    font-size: 18px;
    font-weight: bold;
    border-left: 4px solid var(--btn-add);
    padding-left: 12px;
  }
  .loading {
    text-align: center;
    padding: 20px;
    color: var(--color-tip);
  }
</style>

<div class="top">
  <div class="visitor">chop导航主页</div>
  <div class="right-bar">
    <button class="mode-btn" id="modeToggle">切换亮色模式</button>
    <div class="ver">门户 v1.0</div>
    <button class="donate-btn" onclick="openDonate()">捐赠</button>
  </div>
</div>

<div class="custom-welcome">
  欢迎访问chop工具站(此非巧克力官方网站)！请选择你要进入的页面：
</div>

<!-- 固定入口卡片 -->
<div class="nav-grid">
  <a href="chop.html" class="nav-card">
    <h3>⚙️ chop</h3>
    <p>商品管理、封禁管理、系统设置</p>
  </a>
  <a href="https://space.bilibili.com/3493137687251407" class="nav-card" target="_blank">
    <h3>👤 作者主页</h3>
    <p>个人主页</p>
  </a>
</div>

<!-- 动态代理列表区域 -->
<div class="section-title">📦 代理价目表</div>
<div id="proxyList" class="nav-grid">
  <div class="loading">加载中...</div>
</div>

<div class="external-links">
  <span>外部链接：</span>
  <a href="https://ifdian.net/a/StarRingEngr" target="_blank">作者爱发电</a>
  <a href="https://github.com/StarRingEngr/chop" target="_blank">此项目GitHub</a>
  <a href="https://starringengr.github.io/slimefunAsstOL/" target="_blank">sf在线计算器</a>
  <a href="http://srte.work.gd:32685/" target="_blank">巧克力服非官方在线地图</a>
  <a href="https://mc.zgwl.eu.org" target="_blank">巧克力服官网</a>
</div>

<script src="shared.js"></script>
<script>
  function openDonate() {
    if (confirm("确定前往爱发电支持作者吗？")) window.open("https://ifdian.net/a/StarRingEngr","_blank");
  }

  // 加载 JSONL 代理列表
  async function loadProxyList() {
    const container = document.getElementById('proxyList');
    try {
      const response = await fetch('proxy-list.jsonl');
      if (!response.ok) throw new Error('代理列表加载失败');
      const text = await response.text();
      const lines = text.split('\n').filter(line => line.trim() !== '');
      if (lines.length === 0) {
        container.innerHTML = '<div class="loading">暂无代理价目表</div>';
        return;
      }
      const proxies = lines.map(line => JSON.parse(line));
      container.innerHTML = proxies.map(proxy => `
        <a href="proxies/${encodeURIComponent(proxy.file)}" class="nav-card">
          <h3>📄 ${escapeHtml(proxy.name)}</h3>
          <p>${escapeHtml(proxy.description || '')}</p>
          <p style="font-size: 12px; margin-top: 8px;">版本：${escapeHtml(proxy.version || '')}</p>
        </a>
      `).join('');
    } catch (error) {
      console.error(error);
      container.innerHTML = '<div class="loading">代理列表加载失败，请检查 proxy-list.jsonl 文件是否存在。</div>';
    }
  }

  function escapeHtml(str) {
    if (!str) return '';
    return str.replace(/[&<>]/g, function(m) {
      if (m === '&') return '&amp;';
      if (m === '<') return '&lt;';
      if (m === '>') return '&gt;';
      return m;
    });
  }

  loadProxyList();
</script>
