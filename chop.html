<!DOCTYPE html>
<meta charset="utf-8">
<title>系统面板 - 管理后台</title>

<div class="top">

  <button class="back-home-btn" onclick="location.href='index.html'">🏠 返回主页</button>
  <div class="right-bar">

<div class="custom-welcome">
  欢迎来到chop！这里可以查看各种商品价格以及黑名单
</div>

<input class="search" id="searchInput" placeholder="搜索商品">

<!-- 商品折叠面板 -->
<div class="collapse-section">
  <div style="display:flex;justify-content:space-between;align-items:center;padding:12px 16px;background:var(--bg-collapse-header);">
    <div class="collapse-header" onclick="toggleCollapse('goodCollapse')" style="flex:1;">
      <div style="display:flex;align-items:center">
        <h3>商品列表</h3>
        <span class="collapse-custom-text">点击此条目可折叠/展开</span>
      </div>
      <div class="collapse-toggle" id="goodToggle">^</div>
    </div>
    <button class="add-btn" onclick="openAddGood();event.stopPropagation()">+</button>
  </div>
  <div class="collapse-body" id="goodCollapse">
    <div id="goodList" class="list-container"></div>
  </div>
</div>

<!-- 封禁名单折叠面板 -->
<div class="collapse-section">
  <div style="display:flex;justify-content:space-between;align-items:center;padding:12px 16px;background:var(--bg-collapse-header);">
    <div class="collapse-header" onclick="toggleCollapse('badCollapse')" style="flex:1;">
      <div style="display:flex;align-items:center">
        <h3>封禁名单(黑名单)</h3>
        <span class="collapse-custom-text">点击此条目可折叠/展开</span>
      </div>
      <div class="collapse-toggle" id="badToggle">^</div>
    </div>
    <button class="add-btn" onclick="openAddBad();event.stopPropagation()">+</button>
  </div>
  <div class="collapse-body" id="badCollapse">
    <div id="badList" class="list-container"></div>
  </div>
</div>

<div class="mask" id="mask"><div class="pop" id="pop"></div></div>
<div class="toast" id="toast"></div>

<script src="shared.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script>

const CIPHER = "2cab452a86cc1a46ee9300dc33401135ca30e5749cef346a36b26cac0d96b4bd1f91457bcaee0065d19979d80f75314efe3df445bdd80b192fab76d337b4aaaf2588660bd2c2144b95a378cf0f581f60f43cc26fa3e3551126a848fe769f93dc389b66358de81416d2a019dc50733542f13b9e33bccd251525a87dcb2db2aea07a9c750bd7c62d7a95b51ed415733552b03aef4ee3cc0c1e61be61d371b090827c9f4772cac9187bc4917cfc540f3163c160ef37adf6011c6cba6cab079aa7d70e87492ea9c4037cfbcb3ed32e750255";

let isAdmin = false;
let goods = [], bans = [];
let imageMap = {}; // 图片base64字典

// ===================== 修复转义函数 =====================
function escapeHtml(str) {
  if (!str) return '';
  return str
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;')
    .replace(/'/g, '&#039;');
}

// ===================== 工具函数 =====================
function showPop(html) {
  document.getElementById("pop").innerHTML = html;
  document.getElementById("mask").style.display = "flex";
}
function hidePop() {
  document.getElementById("mask").style.display = "none";
}
function toggleCollapse(id) {
  const body = document.getElementById(id);
  const toggle = document.getElementById(id.replace('Collapse', 'Toggle'));
  body.style.display = body.style.display === 'none' ? 'block' : 'none';
  toggle.textContent = body.style.display === 'block' ? '^' : 'v';
}

// ===================== 智能图片加载（你要的逻辑） =====================
// 1. 加载图片JSON（一次请求）
async function loadImageMap() {
  try {
    const res = await fetch('./images.png.json');
    imageMap = await res.json() || {};
  } catch (e) {
    imageMap = {};
  }
}

// 2. 智能匹配：优先名称 → 再备注 → 无则返回空
function renderItemImage(itemName, info) {
  let base64 = '';
  
  // 第一步：用【名称】找
  if (itemName && imageMap[itemName]) {
    base64 = imageMap[itemName];
  }
  // 第二步：名称找不到 → 用【备注】找
  else if (info && info.trim() && imageMap[info.trim()]) {
    base64 = imageMap[info.trim()];
  }
  // 第三步：都找不到 → 不显示图片
  else {
    return '';
  }

  // 直接输出base64，无懒加载、无延迟、无警告
  return `<img src="${base64}" class="item-img">`;
}

// ===================== 认证 =====================
async function xorDecrypt(hexStr, key) {
  const enc = new TextEncoder();
  const keyData = enc.encode(key);
  const hashBuffer = await crypto.subtle.digest("SHA-256", keyData);
  const hashBytes = new Uint8Array(hashBuffer);
  const dataBytes = new Uint8Array(hexStr.match(/.{1,2}/g).map(b => parseInt(b,16)));
  const res = new Uint8Array(dataBytes.length);
  for(let i=0;i<dataBytes.length;i++) res[i] = dataBytes[i] ^ hashBytes[i % hashBytes.length];
  return new TextDecoder().decode(res);
}

async function doAuth() {
  if (isAdmin) {
    isAdmin = false;
    client = supabase.createClient(SUPABASE_URL, READ_KEY);
    document.getElementById("authBtn").textContent = "游客模式";
    document.getElementById("authBtn").classList.remove("auth-on");
    showToast("已退出登录，恢复游客只读模式");
    refresh();
    return;
  }
  const password = prompt("输入管理员密码\n密码错误只需退出登录即可解决！");
  if (!password) return;
  showToast("验证中...");
  try {
    const adminKey = await xorDecrypt(CIPHER, password);
    client = supabase.createClient(SUPABASE_URL, adminKey);
    isAdmin = true;
    document.getElementById("authBtn").textContent = "退出登录";
    document.getElementById("authBtn").classList.add("auth-on");
    showToast("密码正确，已获得管理员权限");
    refresh();
  } catch (e) {
    showToast("密码错误！请重试");
  }
}

// ===================== 并行请求（速度翻倍） =====================
async function refresh() {
  try {
    const [ivRes, badRes] = await Promise.all([
      client.from("iv").select("*"),
      client.from("badlist").select("*")
    ]);
    goods = ivRes.data || [];
    bans = badRes.data || [];
    renderGood();
    renderBad();
  } catch (e) {
    console.error('数据加载失败:', e);
    showToast("数据加载失败，请重试");
  }
}

function renderGood() {
  const goodList = document.getElementById('goodList');
  if (goods.length === 0) {
    goodList.innerHTML = '<div style="padding:20px;text-align:center;color:var(--color-tip)">暂无商品数据</div>';
    return;
  }
  goodList.innerHTML = goods.map(item => `
    <div class="item" onclick="openEditGood(${item.id})">
      ${renderItemImage(item.name, item.info)}
      <div class="item-content">
        <div class="name">${escapeHtml(item.name)}</div>
        <div class="tip">价格：${escapeHtml(item.price)}</div>
        ${item.info ? `<div class="tip-detail">备注：${escapeHtml(item.info)}</div>` : ''}
      </div>
    </div>
  `).join("");
}

function renderBad() {
  const badList = document.getElementById('badList');
  if (bans.length === 0) {
    badList.innerHTML = '<div style="padding:20px;text-align:center;color:var(--color-tip)">暂无封禁记录</div>';
    return;
  }
  badList.innerHTML = bans.map(item => `
    <div class="item" onclick="openEditBad(${item.id})">
      ${renderItemImage(item.username)}
      <div class="item-content">
        <div class="name">${escapeHtml(item.username)}</div>
        <div class="tip">原因：${escapeHtml(item.reason)}</div>
        ${item.time ? `<div class="tip-detail">时间：${escapeHtml(item.time)}</div>` : ''}
        ${item.operator ? `<div class="tip-detail">操作人：${escapeHtml(item.operator)}</div>` : ''}
      </div>
    </div>
  `).join("");
}

// ===================== 商品管理（完全不变） =====================
function openEditGood(id) {
  if (!isAdmin) return showToast("无管理员权限，请先验证密码");
  const item = goods.find(x => x.id === id);
  if (!item) return showToast("商品不存在");
  showPop(`
    <button class="pop-close" onclick="hidePop()">×</button>
    <h3 class="pop-title">编辑商品</h3>
    <input id="gn" value="${escapeHtml(item.name)}" placeholder="商品名称">
    <input id="gp" value="${escapeHtml(item.price)}" placeholder="商品价格">
    <input id="gi" value="${escapeHtml(item.info || '')}" placeholder="商品备注">
    <button class="btn-save" onclick="saveGood(${id})">保存</button>
    <button class="btn-del" onclick="delGood(${id})">删除</button>
    <button class="btn-cancel" onclick="hidePop()">取消</button>
  `);
}
function openAddGood() {
  if (!isAdmin) return showToast("无管理员权限，请先验证密码");
  showPop(`
    <button class="pop-close" onclick="hidePop()">×</button>
    <h3 class="pop-title">新增商品</h3>
    <input id="gn" placeholder="商品名称">
    <input id="gp" placeholder="商品价格">
    <input id="gi" placeholder="商品备注">
    <button class="btn-save" onclick="addGood()">添加</button>
    <button class="btn-cancel" onclick="hidePop()">取消</button>
  `);
}
async function addGood() {
  const name = document.getElementById('gn').value.trim();
  const price = document.getElementById('gp').value.trim();
  const info = document.getElementById('gi').value.trim();
  if (!name) return showToast("商品名称不能为空");
  try {
    await client.from("iv").insert([{ name, price, info }]);
    hidePop();
    refresh();
    showToast("商品添加成功");
  } catch (e) {
    console.error('添加商品失败:', e);
    showToast("添加商品失败，请重试");
  }
}
async function saveGood(id) {
  const name = document.getElementById('gn').value.trim();
  const price = document.getElementById('gp').value.trim();
  const info = document.getElementById('gi').value.trim();
  if (!name) return showToast("商品名称不能为空");
  try {
    await client.from("iv").update({ name, price, info }).eq("id", id);
    hidePop();
    refresh();
    showToast("商品保存成功");
  } catch (e) {
    console.error('保存商品失败:', e);
    showToast("保存商品失败，请重试");
  }
}
async function delGood(id) {
  if (!confirm("确定删除该商品吗？")) return;
  try {
    await client.from("iv").delete().eq("id", id);
    hidePop();
    refresh();
    showToast("商品删除成功");
  } catch (e) {
    console.error('删除商品失败:', e);
    showToast("删除商品失败，请重试");
  }
}

// ===================== 封禁管理（完全不变） =====================
function openEditBad(id) {
  if (!isAdmin) return showToast("无管理员权限，请先验证密码");
  const item = bans.find(x => x.id === id);
  if (!item) return showToast("封禁记录不存在");
  showPop(`
    <button class="pop-close" onclick="hidePop()">×</button>
    <h3 class="pop-title">编辑封禁</h3>
    <input id="bu" value="${escapeHtml(item.username)}" placeholder="玩家名">
    <input id="br" value="${escapeHtml(item.reason)}" placeholder="封禁原因">
    <div class="input-group">
      <input id="bt" value="${escapeHtml(item.time || '')}" placeholder="封禁时间">
      <button class="time-btn" onclick="fillCurrentTime('bt')">当前时间</button>
    </div>
    <input id="bo" value="${escapeHtml(item.operator || '')}" placeholder="操作人">
    <button class="btn-save" onclick="saveBad(${id})">保存</button>
    <button class="btn-del" onclick="delBad(${id})">删除</button>
    <button class="btn-cancel" onclick="hidePop()">取消</button>
  `);
}
function openAddBad() {
  if (!isAdmin) return showToast("无管理员权限，请先验证密码");
  showPop(`
    <button class="pop-close" onclick="hidePop()">×</button>
    <h3 class="pop-title">新增封禁</h3>
    <input id="bu" placeholder="玩家名">
    <input id="br" placeholder="封禁原因">
    <div class="input-group">
      <input id="bt" placeholder="封禁时间">
      <button class="time-btn" onclick="fillCurrentTime('bt')">当前时间</button>
    </div>
    <input id="bo" placeholder="操作人">
    <button class="btn-save" onclick="addBad()">添加</button>
    <button class="btn-cancel" onclick="hidePop()">取消</button>
  `);
}
async function addBad() {
  const username = document.getElementById('bu').value.trim();
  const reason = document.getElementById('br').value.trim();
  const time = document.getElementById('bt').value.trim() || getCurrentTime();
  const operator = document.getElementById('bo').value.trim();
  if (!username) return showToast("玩家名不能为空");
  if (!reason) return showToast("封禁原因不能为空");
  try {
    await client.from("badlist").insert([{ username, reason, time, operator }]);
    hidePop();
    refresh();
    showToast("封禁记录添加成功");
  } catch (e) {
    console.error('添加封禁失败:', e);
    showToast("添加封禁失败，请重试");
  }
}
async function saveBad(id) {
  const username = document.getElementById('bu').value.trim();
  const reason = document.getElementById('br').value.trim();
  const time = document.getElementById('bt').value.trim();
  const operator = document.getElementById('bo').value.trim();
  if (!username) return showToast("玩家名不能为空");
  if (!reason) return showToast("封禁原因不能为空");
  try {
    await client.from("badlist").update({ username, reason, time, operator }).eq("id", id);
    hidePop();
    refresh();
    showToast("封禁记录保存成功");
  } catch (e) {
    console.error('保存封禁失败:', e);
    showToast("保存封禁失败，请重试");
  }
}
async function delBad(id) {
  if (!confirm("确定删除该封禁记录吗？")) return;
  try {
    await client.from("badlist").delete().eq("id", id);
    hidePop();
    refresh();
    showToast("封禁记录删除成功");
  } catch (e) {
    console.error('删除封禁失败:', e);
    showToast("删除封禁失败，请重试");
  }
}

function openDonate() {
  if (confirm("确定前往爱发电支持作者吗？")) window.open("https://ifdian.net/a/StarRingEngr","_blank");
}

// ===================== 搜索功能 =====================
document.getElementById("searchInput").addEventListener("input", () => {
  const keyword = document.getElementById("searchInput").value.toLowerCase().trim();
  if (!keyword) {
    renderGood();
    return;
  }
  const filteredGoods = goods.filter(item => item.name.toLowerCase().includes(keyword) || (item.info||'').toLowerCase().includes(keyword));
  const goodList = document.getElementById('goodList');
  if (filteredGoods.length === 0) {
    goodList.innerHTML = '<div style="padding:20px;text-align:center;color:var(--color-tip)">未找到匹配的商品</div>';
    return;
  }
  goodList.innerHTML = filteredGoods.map(item => `
    <div class="item" onclick="openEditGood(${item.id})">
      ${renderItemImage(item.name, item.info)}
      <div class="item-content">
        <div class="name">${escapeHtml(item.name)}</div>
        <div class="tip">价格：${escapeHtml(item.price)}</div>
        ${item.info ? `<div class="tip-detail">备注：${escapeHtml(item.info)}</div>` : ''}
      </div>
    </div>
  `).join("");
});

// ===================== 初始化 =====================
async function initAdmin() {
  await loadImageMap(); // 先加载图片JSON
  document.getElementById('authBtn').onclick = doAuth;
  refresh();
  showToast("管理后台初始化完成");
}
window.onload = initAdmin;
</script>
