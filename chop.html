<!-- 商品折叠面板 -->

<script src="shared.js"></script>
<script>

const CIPHER = "2cab452a86cc1a46ee9300dc33401135ca30e5749cef346a36b26cac0d96b4bd1f91457bcaee0065d19979d80f75314efe3df445bdd80b192fab76d337b4aaaf2588660bd2c2144b95a378cf0f581f60f43cc26fa3e3551126a848fe769f93dc389b66358de81416d2a019dc50733542f13b9e33bccd251525a87dcb2db2aea07a9c750bd7c62d7a95b51ed415733552b03aef4ee3cc0c1e61be61d371b090827c9f4772cac9187bc4917cfc540f3163c160ef37adf6011c6cba6cab079aa7d70e87492ea9c4037cfbcb3ed32e750255";

// ===================== 修复转义函数 =====================
function escapeHtml(str) {
  if (!str) return '';
  return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#039;');
}

// ===================== 工具函数 =====================
function showPop(html) {
  document.getElementById("pop").innerHTML = html;
  document.getElementById("mask").style.display = "flex";
}
function hidePop() {
  document.getElementById("mask").style.display = "none";
}
function toggleCollapse(id) {
  const body = document.getElementById(id);
  const toggle = document.getElementById(id.replace('Collapse', 'Toggle'));
  body.style.display = body.style.display === 'none' ? 'block' : 'none';
  toggle.textContent = body.style.display === 'block' ? '^' : 'v';
}

// ===================== 智能图片加载 =====================
async function loadImageMap() {
  try {
    const res = await fetch('./json/images.png.json');
    imageMap = await res.json() || {};
  } catch (e) { imageMap = {}; }
}
function renderItemImage(itemName, info) {
  let base64 = '';
  if (itemName && imageMap[itemName]) base64 = imageMap[itemName];
  else if (info?.trim() && imageMap[info.trim()]) base64 = imageMap[info.trim()];
  else return '';
  return `<img src="${base64}" class="item-img">`;
}

// ===================== 安全的 Supabase 调用 =====================
function safeSupabase() {
  if (!window.supabase) {
    showToast("网络异常：无法加载数据库组件");
    return null;
  }
  if (!client) {
    try {
      client = supabase.createClient(SUPABASE_URL, READ_KEY);
    } catch(e) {
      showToast("数据库连接失败");
      return null;
    }
  }
  return client;
}

// ===================== 认证 =====================
async function xorDecrypt(hexStr, key) {
  const enc = new TextEncoder();
  const keyData = enc.encode(key);
  const hashBuffer = await crypto.subtle.digest("SHA-256", keyData);
  const hashBytes = new Uint8Array(hashBuffer);
  const dataBytes = new Uint8Array(hexStr.match(/.{1,2}/g).map(b => parseInt(b,16)));
  const res = new Uint8Array(dataBytes.length);
  for(let i=0;i<dataBytes.length;i++) res[i] = dataBytes[i] ^ hashBytes[i % hashBytes.length];
  return new TextDecoder().decode(res);
}

async function doAuth() {
  if (!safeSupabase()) return;
  if (isAdmin) {
    isAdmin = false;
    client = supabase.createClient(SUPABASE_URL, READ_KEY);
    document.getElementById("authBtn").textContent = "游客模式";
    document.getElementById("authBtn").classList.remove("auth-on");
    showToast("已退出登录");
    refresh();
    return;
  }
  const pwd = prompt("请输入管理员密码");
  if (!pwd) return;
  showToast("正在验证...");
  try {
    const adminKey = await xorDecrypt(CIPHER, pwd);
    client = supabase.createClient(SUPABASE_URL, adminKey);
    isAdmin = true;
    document.getElementById("authBtn").textContent = "退出登录";
    document.getElementById("authBtn").classList.add("auth-on");
    showToast("登录成功");
    refresh();
  } catch(e) {
    showToast("密码错误");
  }
}

// ===================== 安全刷新数据 =====================
async function refresh() {
  const sb = safeSupabase();
  if (!sb) return;

  try {
    const [ivRes, badRes] = await Promise.all([
      sb.from("iv").select("*"),
      sb.from("badlist").select("*")
    ]);
    goods = ivRes.data || [];
    bans = badRes.data || [];
    renderGood();
    renderBad();
  } catch(e) {
    showToast("数据加载超时或网络异常");
  }
}

function renderGood() {
  const el = document.getElementById('goodList');
  if (!goods.length) { el.innerHTML = '<div style="padding:20px;text-align:center">暂无商品数据</div>'; return; }
  el.innerHTML = goods.map(i => `
    <div class="item" onclick="openEditGood(${i.id})">
      ${renderItemImage(i.name, i.info)}
      <div class="item-content">
        <div class="name">${escapeHtml(i.name)}</div>
        <div class="tip">价格：${escapeHtml(i.price)}</div>
        ${i.info ? `<div class="tip-detail">备注：${escapeHtml(i.info)}</div>` : ''}
      </div>
    </div>
  `).join('');
}
function renderBad() {
  const el = document.getElementById('badList');
  if (!bans.length) { el.innerHTML = '<div style="padding:20px;text-align:center">暂无封禁记录</div>'; return; }
  el.innerHTML = bans.map(i => `
    <div class="item" onclick="openEditBad(${i.id})">
      ${renderItemImage(i.username)}
      <div class="item-content">
        <div class="name">${escapeHtml(i.username)}</div>
        <div class="tip">原因：${escapeHtml(i.reason)}</div>
        ${i.time ? `<div class="tip-detail">时间：${escapeHtml(i.time)}</div>` : ''}
        ${i.operator ? `<div class="tip-detail">操作人：${escapeHtml(i.operator)}</div>` : ''}
      </div>
    </div>
  `).join('');
}

// ===================== 业务逻辑（完全没动） =====================
function openEditGood(id){if(!isAdmin)return showToast("无管理员权限");const i=goods.find(x=>x.id==id);if(!i)return;showPop(`<button class=pop-close onclick=hidePop()>×</button><h3 class=pop-title>编辑商品</h3><input id=gn value="${escapeHtml(i.name)}"><input id=gp value="${escapeHtml(i.price)}"><input id=gi value="${escapeHtml(i.info||'')}"><button class=btn-save onclick=saveGood(${id})>保存</button><button class=btn-del onclick=delGood(${id})>删除</button><button class=btn-cancel onclick=hidePop()>取消</button>`)}
function openAddGood(){if(!isAdmin)return showToast("无管理员权限");showPop(`<button class=pop-close onclick=hidePop()>×</button><h3 class=pop-title>新增商品</h3><input id=gn placeholder=商品名称><input id=gp placeholder=商品价格><input id=gi placeholder=商品备注><button class=btn-save onclick=addGood()>添加</button><button class=btn-cancel onclick=hidePop()>取消</button>`)}
async function addGood(){if(!safeSupabase())return;const n=document.getElementById('gn').value.trim(),p=document.getElementById('gp').value.trim(),i=document.getElementById('gi').value.trim();if(!n)return showToast("商品名称不能为空");try{await client.from("iv").insert([{name:n,price:p,info:i}]);hidePop();refresh();showToast("添加成功");}catch(e){showToast("操作失败");}}
async function saveGood(id){if(!safeSupabase())return;const n=document.getElementById('gn').value.trim(),p=document.getElementById('gp').value.trim(),i=document.getElementById('gi').value.trim();if(!n)return showToast("商品名称不能为空");try{await client.from("iv").update({name:n,price:p,info:i}).eq("id",id);hidePop();refresh();showToast("保存成功");}catch(e){showToast("操作失败");}}
async function delGood(id){if(!safeSupabase())return;if(!confirm("确定删除？"))return;try{await client.from("iv").delete().eq("id",id);hidePop();refresh();showToast("删除成功");}catch(e){showToast("操作失败");}}

function openEditBad(id){if(!isAdmin)return showToast("无管理员权限");const i=bans.find(x=>x.id==id);if(!i)return;showPop(`<button class=pop-close onclick=hidePop()>×</button><h3 class=pop-title>编辑封禁</h3><input id=bu value="${escapeHtml(i.username)}"><input id=br value="${escapeHtml(i.reason)}"><div class=input-group><input id=bt value="${escapeHtml(i.time||'')}"><button class=time-btn onclick=fillCurrentTime('bt')>当前时间</button></div><input id=bo value="${escapeHtml(i.operator||'')}"><button class=btn-save onclick=saveBad(${id})>保存</button><button class=btn-del onclick=delBad(${id})>删除</button><button class=btn-cancel onclick=hidePop()>取消</button>`)}
function openAddBad(){if(!isAdmin)return showToast("无管理员权限");showPop(`<button class=pop-close onclick=hidePop()>×</button><h3 class=pop-title>新增封禁</h3><input id=bu placeholder=玩家名><input id=br placeholder=封禁原因><div class=input-group><input id=bt placeholder=封禁时间><button class=time-btn onclick=fillCurrentTime('bt')>当前时间</button></div><input id=bo placeholder=操作人><button class=btn-save onclick=addBad()>添加</button><button class=btn-cancel onclick=hidePop()>取消</button>`)}
async function addBad(){if(!safeSupabase())return;const u=document.getElementById('bu').value.trim(),r=document.getElementById('br').value.trim(),t=document.getElementById('bt').value.trim()||getCurrentTime(),o=document.getElementById('bo').value.trim();if(!u||!r)return showToast("信息不能为空");try{await client.from("badlist").insert([{username:u,reason:r,time:t,operator:o}]);hidePop();refresh();showToast("添加成功");}catch(e){showToast("操作失败");}}
async function saveBad(id){if(!safeSupabase())return;const u=document.getElementById('bu').value.trim(),r=document.getElementById('br').value.trim(),t=document.getElementById('bt').value.trim(),o=document.getElementById('bo').value.trim();if(!u||!r)return showToast("信息不能为空");try{await client.from("badlist").update({username:u,reason:r,time:t,operator:o}).eq("id",id);hidePop();refresh();showToast("保存成功");}catch(e){showToast("操作失败");}}
async function delBad(id){if(!safeSupabase())return;if(!confirm("确定删除？"))return;try{await client.from("badlist").delete().eq("id",id);hidePop();refresh();showToast("删除成功");}catch(e){showToast("操作失败");}}

function openDonate(){if(confirm("确定前往爱发电？"))window.open("https://ifdian.net/a/StarRingEngr","_blank")}

// ===================== 搜索 =====================
document.getElementById("searchInput").addEventListener("input", () => {
  const kw = document.getElementById("searchInput").value.toLowerCase().trim();
  if (!kw) { renderGood(); return; }
  const list = goods.filter(i => i.name.toLowerCase().includes(kw) || (i.info||'').toLowerCase().includes(kw));
  const el = document.getElementById('goodList');
  if (!list.length) { el.innerHTML = '<div style="padding:20px;text-align:center">未找到匹配商品</div>'; return; }
  el.innerHTML = list.map(i => `
    <div class="item" onclick="openEditGood(${i.id})">
      ${renderItemImage(i.name, i.info)}
      <div class="item-content">
        <div class="name">${escapeHtml(i.name)}</div>
        <div class="tip">价格：${escapeHtml(i.price)}</div>
        ${i.info ? `<div class="tip-detail">备注：${escapeHtml(i.info)}</div>` : ''}
      </div>
    </div>
  `).join('');
});

// ===================== 核心：先显示页面 → 再加载 JS → 再请求数据 =====================
async function start() {
  await loadImageMap();
  loadSupabaseScript();
}

function loadSupabaseScript() {
  setTimeout(() => {
    const s = document.createElement('script');
    s.src = 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js';
    s.onload = () => {
      setTimeout(() => {
        refresh();
        showToast("数据连接成功");
      }, 100);
    };
    s.onerror = () => {
      showToast("网络异常：数据库组件加载失败");
    };
    document.body.appendChild(s);
  }, 300);
}

window.onload = () => {
  document.getElementById('authBtn').onclick = doAuth;
  start();
  showToast("页面加载完成，正在连接数据...");
};
