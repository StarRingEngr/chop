<!DOCTYPE html>
<meta charset="utf-8">
<title>代理价目表 - 可配置模板</title>
<link rel="stylesheet" href="../shared.css">

<div class="top">
  <div class="visitor">游客模式（只读）</div>
  <button class="back-home-btn" onclick="location.href='../index.html'">🏠 返回主页</button>
  <div class="right-bar">
    <button class="mode-btn" id="modeToggle">切换亮色模式</button>
    <div class="ver" id="ver"></div>
    <button class="donate-btn" id="donateBtn">捐赠</button>
  </div>
</div>

<div class="title" id="pageTitle" style="padding:12px 16px;margin:10px 16px;background:var(--bg-item);border-radius:8px;"></div>
<input type="text" class="search" id="search" placeholder="搜索商品...">
<div class="list" id="goodsList" style="margin-top:16px;"></div>
<div class="toast" id="toast"></div>

<script src="../shared.js"></script>
<script>
  // ===================== 配置区域（修改这里即可生成新页面） =====================
  const CONFIG = {
    PAGE_TITLE: "zzb120107的价目表",
    VERSION: "V1.2.1",
    GOODS: [
      ["玄武岩", "Unknown"],
      ["下界合金锭", "Unknown"],
      ["升级模板", "Unknown"],
      ["锇粉", "Unknown"],
      ["下界冰", "Unknown"],
      ["失水乐魂", "Unknown"],
      ["黑金刚石", "Unknown"],
      ["红石合金锭", "Unknown"],
      ["Pu元素", "Unknown"],
      ["甘蔗", "Unknown"],
      ["凋零玫瑰", "0.005"]
    ]
  };
  // ===================== 以下代码无需修改 =====================

  const el = {
    pageTitle: document.getElementById("pageTitle"),
    ver: document.getElementById("ver"),
    donateBtn: document.getElementById("donateBtn"),
    search: document.getElementById("search"),
    goodsList: document.getElementById("goodsList"),
  };

  el.pageTitle.textContent = CONFIG.PAGE_TITLE;
  el.ver.textContent = CONFIG.VERSION;

  const renderGoods = (goods = CONFIG.GOODS) => {
    const validGoods = goods.filter(item => item[0]?.trim() || item[1]?.trim());
    if (validGoods.length === 0) {
      el.goodsList.innerHTML = '<div style="padding:20px;text-align:center;color:var(--color-tip)">暂无商品数据</div>';
      return;
    }
    const createItemHtml = ([name, price]) => `
      <div class="item">
        <img src="" class="item-img" style="display:none">
        <div class="item-info">
          <div class="name">${escapeHtml(name)}</div>
          <div class="price">价格：${escapeHtml(price)}</div>
        </div>
      </div>
    `;
    el.goodsList.innerHTML = validGoods.map(createItemHtml).join("");
  };

  el.donateBtn.addEventListener('click', () => {
      confirm("确定前往支持作者吗？") && window.open("https://ifdian.net/a/StarRingEngr", "_blank");
  });

  el.search.addEventListener("input", (e) => {
    const keyword = e.target.value.toLowerCase().trim();
    keyword 
      ? renderGoods(CONFIG.GOODS.filter(item => item[0].toLowerCase().includes(keyword)))
      : renderGoods();
  });

  window.onload = () => {
    renderGoods();
    showToast("价目表加载完成");
  };
</script>
