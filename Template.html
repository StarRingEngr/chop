<!DOCTYPE html>
<meta charset="utf-8">
<title>代理价目表</title>
<style>
  *{box-sizing:border-box;margin:0;padding:0;}
  body{
    font-family:微软雅黑;
    background: #121212;
    color: #e0e0e0;
    transition: all 0.3s ease;
  }
  body.light{background: #f5f5f5;color: #333;}

  .top{display:flex;justify-content:space-between;align-items:center;padding:12px 16px;background: #1a1a1a;}
  body.light .top{background: #fff;}
  .visitor{font-size:14px;}
  .right{display:flex;gap:10px;align-items:center;}
  .mode-btn,.donate-btn{padding:8px 12px;border:0;border-radius:6px;cursor:pointer;font-size:12px;}
  .mode-btn{background: #252525;color: #e0e0e0;}
  body.light .mode-btn{background: #e0e0e0;color: #333;}
  .ver{font-size:12px;color: #888;}
  .donate-btn{padding:8px 16px;background: #b85a00;color: #fff;}

  .title,.search,.item{background: #1c1c1c;border-radius:8px;}
  .title{padding:12px 16px;margin:10px 16px;font-size:14px;}
  .search{width:calc(100% - 32px);margin:0 16px 10px;padding:12px 16px;border:0;outline:none;font-size:14px;color: #e0e0e0;}
  body.light .title,body.light .item,body.light .search{background: #fff;color: #333;}

  .list{display:grid;grid-template-columns:repeat(auto-fill, minmax(280px, 1fr));gap:12px;padding:0 16px 20px;}
  .item{padding:12px;display:flex;align-items:center;gap:12px;}
  .item-img{width:64px;height:64px;border-radius:8px;object-fit:cover;display:none;}
  .item-info{flex:1;}
  .name{font-weight:bold;font-size:14px;margin-bottom:4px;}
  .price{font-size:12px;color: #999;}
  body.light .price{color: #666;}

  .toast{position:fixed;left:50%;bottom:24px;transform:translateX(-50%);background: #252525;color: #e0e0e0;padding:10px 20px;border-radius:8px;display:none;z-index:999;font-size:12px;}
  body.light .toast{background: #e0e0e0;color: #333;}
</style>

<div class="top">
  <div class="visitor">游客模式（只读）</div>
  <div class="right">
    <button class="mode-btn" id="modeBtn">切换亮色模式</button>
    <div class="ver" id="ver"></div>
    <button class="donate-btn" id="donateBtn">捐赠</button>
  </div>
</div>

<div class="title" id="pageTitle"></div>
<input type="text" class="search" id="search" placeholder="搜索商品...">
<div class="list" id="goodsList"></div>
<div class="toast" id="toast"></div>

<script>
  const CONFIG = {
    PAGE_TITLE: "XXX的价目表",
    VERSION: "V1.2.1",
    // 使用这个生成base64 https://www.toolhelper.cn/Image/Base64?tab=image
    GOODS: [
      ["普通", "50", ""],
      ["高级", "100", ""],
      ["超级", "200", ""]
    ]
  };
  const el = {
    pageTitle: document.getElementById("pageTitle"),
    ver: document.getElementById("ver"),
    modeBtn: document.getElementById("modeBtn"),
    donateBtn: document.getElementById("donateBtn"),
    search: document.getElementById("search"),
    goodsList: document.getElementById("goodsList"),
    toast: document.getElementById("toast")
  };
  el.pageTitle.textContent = CONFIG.PAGE_TITLE;
  el.ver.textContent = CONFIG.VERSION;
  const showToast = (txt) => {
    el.toast.textContent = txt;
    el.toast.style.display = "block";
    setTimeout(() => el.toast.style.display = "none", 2000);
  };
  const renderGoods = (goods = CONFIG.GOODS) => {
    const validGoods = goods.filter(item => item[0].trim() || item[1].trim());
    if (validGoods.length === 0) {
      el.goodsList.innerHTML = '<div style="padding:20px;text-align:center;color:#999">暂无商品数据</div>';
      return;
    }
    const createItemHtml = ([name, price, imgCode = ""]) => `
      <div class="item">
        <img src="${imgCode}" class="item-img" style="${imgCode.trim() ? 'display:block' : 'display:none'}">
        <div class="item-info">
          <div class="name">${name}</div>
          <div class="price">价格：${price}</div>
        </div>
      </div>
    `;
    el.goodsList.innerHTML = validGoods.map(createItemHtml).join("");
  };
  let isDark = true;
  el.modeBtn.onclick = () => {
    isDark = !isDark;
    document.body.classList.toggle("light", !isDark);
    el.modeBtn.textContent = isDark ? "切换亮色模式" : "切换暗色模式";
    showToast(`已切换为${isDark ? "暗色" : "亮色"}模式`);
  };
  el.donateBtn.addEventListener('click', () => {
    confirm("确定前往爱发电支持作者吗？") && window.open("https://ifdian.net/a/StarRingEngr","_blank");
  });
  el.search.addEventListener("input", (e) => {
    const keyword = e.target.value.toLowerCase().trim();
    keyword 
      ? renderGoods(CONFIG.GOODS.filter(item => item[0].toLowerCase().includes(keyword)))
      : renderGoods();
  });
  window.onload = () => {
    renderGoods();
    showToast("价目表加载完成");
  };
</script>
